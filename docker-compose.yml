services:
  typetype-token:
    image: ghcr.io/priveetee/typetype-token:latest
    ports:
      - "8081:8081"
    restart: unless-stopped
    init: true
    ipc: host
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:8081/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
